<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Swarm and Bee">
  <!-- bee silhouette · two-tone monogram for tab + share -->
  <!-- background hex glyph -->
  <rect width="64" height="64" rx="14" fill="#0a0c11"/>

  <!-- wings (back, smaller) -->
  <ellipse cx="20" cy="24" rx="8" ry="5" fill="#7df0a7" opacity="0.85"/>
  <ellipse cx="44" cy="24" rx="8" ry="5" fill="#7df0a7" opacity="0.85"/>
  <!-- wings highlight -->
  <ellipse cx="20" cy="22" rx="5" ry="3" fill="#b8f5cf" opacity="0.55"/>
  <ellipse cx="44" cy="22" rx="5" ry="3" fill="#b8f5cf" opacity="0.55"/>

  <!-- body -->
  <ellipse cx="32" cy="38" rx="15" ry="17" fill="#f5b800"/>

  <!-- body stripes -->
  <path d="M19 33 Q32 31 45 33 L45 36 Q32 34 19 36 Z" fill="#0a0c11"/>
  <path d="M18 42 Q32 40 46 42 L46 45 Q32 43 18 45 Z" fill="#0a0c11"/>
  <path d="M21 50 Q32 49 43 50 L42 52.5 Q32 51.5 22 52.5 Z" fill="#0a0c11"/>

  <!-- head -->
  <circle cx="32" cy="22" r="6.5" fill="#f5b800"/>

  <!-- antennae -->
  <path d="M29 17 Q27 12 25 11" stroke="#0a0c11" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M35 17 Q37 12 39 11" stroke="#0a0c11" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="25" cy="11" r="1.5" fill="#0a0c11"/>
  <circle cx="39" cy="11" r="1.5" fill="#0a0c11"/>

  <!-- eyes -->
  <circle cx="29.5" cy="22" r="1.2" fill="#0a0c11"/>
  <circle cx="34.5" cy="22" r="1.2" fill="#0a0c11"/>
</svg>
