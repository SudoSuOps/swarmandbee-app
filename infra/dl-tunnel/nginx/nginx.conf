# nginx config · dl.swarmandbee.ai · bakery order downloads
#
# Serves *.zip / *.json / *.md / *.txt from /volume1/swarm/bakery-orders/
# at URL pattern https://dl.swarmandbee.ai/orders/<order_id>/<file>
#
# Hardened defaults:
#   - no directory listing
#   - no hidden files (.git, .DS_Store, .env, etc)
#   - force Content-Disposition: attachment on .zip
#   - CF-edge caching for 24h (bundles are immutable once written)
#   - 404 on everything outside the allowed pattern
#   - no upload accepted

worker_processes auto;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 1m;
    gzip off;

    # Make sure .zip and .json get the right MIME
    types {
        application/zip       zip;
        application/json      json;
        text/markdown         md;
        text/plain            txt;
    }

    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;

        # Healthcheck (exact match, highest priority)
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok\n';
        }

        # Block all dotfiles — .git, .DS_Store, .env, etc
        location ~ /\. {
            access_log off;
            return 404;
        }

        # Order bundle downloads — force browser to download instead of opening
        location ~ ^/orders/.*\.zip$ {
            autoindex off;
            add_header Content-Disposition 'attachment';
            add_header Cache-Control 'public, max-age=86400, immutable';
            add_header X-Source 'Swarm-and-Bee · NAS · sovereign-distribution';
            try_files $uri =404;
        }

        # Manifests + receipts + READMEs — viewable inline so customers can
        # paste-check the JSON in a browser before unzipping
        location ~ ^/orders/.*\.(json|md|txt)$ {
            autoindex off;
            add_header Cache-Control 'public, max-age=86400, immutable';
            add_header X-Source 'Swarm-and-Bee · NAS · sovereign-distribution';
            try_files $uri =404;
        }

        # Everything else under /orders/ → 404 (blocks directory listing, .exe, etc)
        location /orders/ {
            return 404;
        }

        # Root and everything else → 404
        location / {
            add_header Content-Type text/plain;
            return 404 'Not found.\n';
        }
    }
}
